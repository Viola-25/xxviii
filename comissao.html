<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Comissão - Med XXVIII</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CKEditor 5 -->
    <script src="https://cdn.ckeditor.com/ckeditor5/41.1.0/classic/ckeditor.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { camilo: { primary: '#8B0000', secondary: '#D4AF37' } }
                }
            }
        }
    </script>
    <style>
        /* Ajuste de altura do editor */
        .ck-editor__editable {
            min-height: 250px;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-20">
    <nav class="bg-camilo-primary text-white shadow-lg p-4 mb-8">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg md:text-xl uppercase tracking-wider">Painel <span class="hidden md:inline text-camilo-secondary">Med XXVIII</span></h1>
            <div class="flex items-center gap-2 md:gap-4">
                <a href="index.html" class="text-xs md:text-sm bg-white/20 hover:bg-white/30 px-3 py-1 rounded transition"><i class="fa-solid fa-house mr-1"></i> Dashboard</a>
                <button id="btn-logout" class="hidden text-xs md:text-sm bg-red-700 hover:bg-red-800 px-3 py-1 rounded transition"><i class="fa-solid fa-power-off mr-1"></i> Sair</button>
            </div>
        </div>
    </nav>

    <!-- Tela de Login -->
    <div id="login-container" class="max-w-md mx-auto px-4 mt-12 md:mt-20">
        <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-200">
            <div class="text-center mb-8">
                <i class="fa-solid fa-lock text-camilo-primary text-4xl mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-800">Acesso Restrito</h2>
                <p class="text-gray-500 text-sm">Identifique-se para gerenciar avisos</p>
            </div>
            <form id="form-login" class="space-y-4">
                <input type="email" id="login-email" required class="w-full p-3 border rounded-md outline-none focus:ring-2 focus:ring-camilo-primary" placeholder="E-mail">
                <input type="password" id="login-password" required class="w-full p-3 border rounded-md outline-none focus:ring-2 focus:ring-camilo-primary" placeholder="Senha">
                <button type="submit" class="w-full bg-camilo-primary text-white font-bold py-3 rounded-md hover:bg-red-900 transition">Entrar</button>
                <p id="login-error" class="text-red-600 text-sm text-center hidden"></p>
            </form>
        </div>
    </div>

    <!-- Conteúdo Principal (Oculto até o login) -->
    <main id="main-content" class="max-w-4xl mx-auto px-4 hidden">
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="p-6 border-b border-gray-100">
                <h2 class="text-lg font-bold text-gray-800" id="form-title">Novo Aviso</h2>
                <p class="text-sm text-gray-500">Preencha os campos abaixo para publicar no dashboard.</p>
            </div>

            <form id="form-aviso" class="p-6 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Título do Aviso</label>
                        <input type="text" id="titulo" required class="w-full p-2 border rounded-md focus:ring-2 focus:ring-camilo-primary outline-none" placeholder="Ex: 🗓️ Venda de Mesas">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Categoria</label>
                        <select id="categoria" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-camilo-primary outline-none">
                            <option value="Comissão">Comissão</option>
                            <option value="Financeiro">Financeiro</option>
                            <option value="Eventos">Eventos</option>
                            <option value="Importante">Importante</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Data de Exibição</label>
                        <input type="text" id="data" required class="w-full p-2 border rounded-md focus:ring-2 focus:ring-camilo-primary outline-none" placeholder="Ex: 15 Mar">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Link (Opcional)</label>
                        <input type="url" id="link" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-camilo-primary outline-none" placeholder="https://...">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1 flex justify-between">
                        Mensagem (HTML permitido)
                        <span class="text-xs text-gray-400">Use os botões para formatar</span>
                    </label>
                    <!-- O CKEditor substituirá este textarea -->
                    <textarea id="mensagem" rows="10" class="w-full p-2 border rounded-md outline-none" placeholder="Digite o conteúdo aqui..."></textarea>
                </div>

                <button type="submit" id="btn-submit" class="w-full bg-camilo-primary text-white font-bold py-3 rounded-md hover:bg-red-900 transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-paper-plane"></i> Publicar Aviso
                </button>
                <button type="button" id="btn-cancel-edit" class="w-full bg-gray-300 text-gray-800 font-bold py-3 rounded-md hover:bg-gray-400 transition flex items-center justify-center gap-2 mt-2 hidden">
                    <i class="fa-solid fa-xmark"></i> Cancelar Edição
                </button>
            </form>
        </div>

        <div id="status" class="mt-4 hidden p-4 rounded-md text-center font-medium"></div>

        <!-- Avisos Existentes -->
        <div class="mt-8">
            <div class="flex items-center gap-4 mb-4">
                <h2 class="text-xl font-bold text-gray-800">Avisos Existentes</h2>
                <div class="h-px bg-gray-300 flex-1"></div>
            </div>
            <div id="lista-avisos" class="space-y-4">
                <p class="text-gray-500 text-center">Carregando avisos...</p>
            </div>
        </div>

        <!-- Gerenciar Forms -->
        <div class="mt-12 bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
            <div class="p-6 border-b border-gray-100 bg-gray-50">
                <h2 class="text-lg font-bold text-gray-800"><i class="fa-solid fa-file-signature mr-2 text-camilo-secondary"></i> Forms Ativos</h2>
                <p class="text-sm text-gray-500">Adicione links rápidos para formulários e pesquisas.</p>
            </div>
            <form id="form-forms" class="p-6 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="form-titulo" required class="p-2 border rounded-md focus:ring-2 focus:ring-camilo-secondary outline-none text-sm" placeholder="Título do Form">
                    <input type="url" id="form-link" required class="p-2 border rounded-md focus:ring-2 focus:ring-camilo-secondary outline-none text-sm" placeholder="Link (https://...)">
                </div>
                <button type="submit" id="btn-submit-form" class="w-full bg-camilo-secondary text-white font-bold py-2 rounded-md hover:bg-yellow-600 transition text-sm">
                    Adicionar Formulário
                </button>
            </form>
            <div id="lista-forms" class="p-6 border-t border-gray-50 bg-white">
                <p class="text-gray-400 text-center text-xs">Carregando forms...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"; // Importa a função de inicialização do Firebase
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"; // Importa as funções do Firestore
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"; // Importa Auth

        const firebaseConfig = {
            apiKey: "AIzaSyCDz76CjYtjQa31WVOJRYNzrQLmyF7Bg2k",
            authDomain: "med-sc-xxviii-dashboard.firebaseapp.com",
            projectId: "med-sc-xxviii-dashboard",
            storageBucket: "med-sc-xxviii-dashboard.firebasestorage.app",
            messagingSenderId: "1053109121063",
            appId: "1:1053109121063:web:643f68f16975ac16951e02",
            measurementId: "G-S6S7XQ7HG2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let editorInstance;

        // Inicializar o Editor Visual (CKEditor 5)
        ClassicEditor
            .create(document.querySelector('#mensagem'), {
                toolbar: ['heading', '|', 'bold', 'italic', 'link', 'bulletedList', 'numberedList', 'insertTable', 'undo', 'redo']
            })
            .then(editor => {
                editorInstance = editor;
            })
            .catch(error => console.error(error));

        // Elementos da UI
        const form = document.getElementById('form-aviso');
        const formTitle = document.getElementById('form-title');
        const status = document.getElementById('status');
        const btnSubmit = document.getElementById('btn-submit');
        const btnCancelEdit = document.getElementById('btn-cancel-edit');
        const listaAvisos = document.getElementById('lista-avisos');
        const loginContainer = document.getElementById('login-container');
        const mainContent = document.getElementById('main-content');
        const btnLogout = document.getElementById('btn-logout');
        const formLogin = document.getElementById('form-login');
        const loginError = document.getElementById('login-error');
        const formForms = document.getElementById('form-forms');
        const listaForms = document.getElementById('lista-forms');

        // Observador de Estado de Autenticação
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginContainer.classList.add('hidden');
                mainContent.classList.remove('hidden');
                btnLogout.classList.remove('hidden');
                renderAvisos();
                renderForms();
            } else {
                loginContainer.classList.remove('hidden');
                mainContent.classList.add('hidden');
                btnLogout.classList.add('hidden');
            }
        });

        // Lógica de Login
        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                loginError.classList.add('hidden');
            } catch (error) {
                console.error(error);
                loginError.textContent = "Acesso negado. Verifique suas credenciais.";
                loginError.classList.remove('hidden');
            }
        });

        // Lógica de Logout
        btnLogout.addEventListener('click', () => signOut(auth));

        let editingAvisoId = null; // Variável para armazenar o ID do aviso sendo editado

        // Função auxiliar para limpar o formulário e resetar o estado
        function clearForm() {
            form.reset();
            if (editorInstance) editorInstance.setData('');
            editingAvisoId = null;
            formTitle.textContent = "Novo Aviso";
            btnSubmit.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Publicar Aviso';
            btnCancelEdit.classList.add('hidden');
            status.classList.add('hidden');
        }

        // Função para renderizar os avisos existentes
        async function renderAvisos() {
            listaAvisos.innerHTML = '<p class="text-gray-500 text-center"><i class="fa-solid fa-circle-notch animate-spin mr-2"></i> Carregando avisos...</p>';
            try {
                const q = query(collection(db, "avisos"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                const avisos = [];
                querySnapshot.forEach((doc) => {
                    avisos.push({ id: doc.id, ...doc.data() });
                });

                if (avisos.length === 0) {
                    listaAvisos.innerHTML = '<p class="text-gray-500 text-center">Nenhum aviso publicado ainda.</p>';
                    return;
                }

                listaAvisos.innerHTML = avisos.map(aviso => `
                    <div class="bg-white rounded-lg p-4 shadow-sm border border-gray-100 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
                        <div>
                            <h4 class="font-bold text-gray-800">${aviso.titulo}</h4>
                            <p class="text-sm text-gray-500">${aviso.data} - ${aviso.categoria}</p>
                        </div>
                        <div class="flex gap-2 flex-wrap sm:flex-nowrap">
                            <button type="button" data-id="${aviso.id}" class="btn-edit px-3 py-1 bg-blue-100 text-blue-700 rounded text-xs hover:bg-blue-200 transition">
                                <i class="fa-solid fa-pen"></i> Editar
                            </button>
                            <button type="button" data-id="${aviso.id}" class="btn-delete px-3 py-1 bg-red-100 text-red-700 rounded text-xs hover:bg-red-200 transition">
                                <i class="fa-solid fa-trash"></i> Excluir
                            </button>
                        </div>
                    </div>
                `).join('');

                // Adicionar event listeners para os botões de editar e excluir
                document.querySelectorAll('.btn-edit').forEach(button => {
                    button.addEventListener('click', (e) => {
                        const id = e.currentTarget.dataset.id;
                        const avisoToEdit = avisos.find(av => av.id === id);
                        if (avisoToEdit) {
                            document.getElementById('titulo').value = avisoToEdit.titulo;
                            document.getElementById('categoria').value = avisoToEdit.categoria;
                            document.getElementById('data').value = avisoToEdit.data;
                            document.getElementById('link').value = avisoToEdit.link || '';
                            if (editorInstance) editorInstance.setData(avisoToEdit.mensagem);
                            // O campo linkTexto é gerado automaticamente, não precisa ser preenchido
                            
                            editingAvisoId = id;
                            formTitle.textContent = "Editar Aviso";
                            btnSubmit.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Atualizar Aviso';
                            btnCancelEdit.classList.remove('hidden');
                            window.scrollTo({ top: 0, behavior: 'smooth' }); // Rola para o formulário
                        }
                    });
                });

                document.querySelectorAll('.btn-delete').forEach(button => {
                    button.addEventListener('click', async (e) => {
                        const id = e.currentTarget.dataset.id;
                        if (confirm("Tem certeza que deseja excluir este aviso?")) {
                            try {
                                await deleteDoc(doc(db, "avisos", id));
                                status.textContent = "🗑️ Aviso excluído com sucesso!";
                                status.className = "mt-4 p-4 rounded-md text-center font-medium bg-green-100 text-green-800";
                                status.classList.remove('hidden');
                                renderAvisos(); // Atualiza a lista
                            } catch (error) {
                                console.error("Erro ao excluir aviso:", error);
                                status.textContent = "❌ Erro ao excluir: " + error.message;
                                status.className = "mt-4 p-4 rounded-md text-center font-medium bg-red-100 text-red-800";
                                status.classList.remove('hidden');
                            }
                        }
                    });
                });

            } catch (error) {
                console.error("Erro ao carregar avisos existentes:", error);
                listaAvisos.innerHTML = '<p class="text-red-500 text-center">Erro ao carregar avisos.</p>';
            }
        }

        // Botão de cancelar edição
        btnCancelEdit.addEventListener('click', clearForm);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> Enviando...';

            const dados = {
                titulo: document.getElementById('titulo').value,
                categoria: document.getElementById('categoria').value,
                data: document.getElementById('data').value,
                link: document.getElementById('link').value,
                linkTexto: document.getElementById('link').value ? "Saiba mais" : "",
                mensagem: editorInstance.getData(), // Pega o conteúdo formatado
            };

            try {
                if (editingAvisoId) {
                    // Atualiza aviso existente
                    await updateDoc(doc(db, "avisos", editingAvisoId), dados);
                    status.textContent = "✅ Aviso atualizado com sucesso!";
                } else {
                    // Cria novo aviso com timestamp
                    await addDoc(collection(db, "avisos"), { ...dados, createdAt: serverTimestamp() });
                    status.textContent = "✅ Aviso publicado com sucesso!";
                }
                status.className = "mt-4 p-4 rounded-md text-center font-medium bg-green-100 text-green-800";
                status.classList.remove('hidden');
                clearForm();
                renderAvisos();
            } catch (error) {
                console.error(error);
                status.textContent = "❌ Erro ao publicar: " + error.message;
                status.className = "mt-4 p-4 rounded-md text-center font-medium bg-red-100 text-red-800";
                status.classList.remove('hidden');
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Publicar Aviso';
            }
        });

        // --- LÓGICA DE FORMS ---
        async function renderForms() {
            try {
                const q = query(collection(db, "forms"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                const forms = [];
                querySnapshot.forEach((doc) => forms.push({ id: doc.id, ...doc.data() }));

                if (forms.length === 0) {
                    listaForms.innerHTML = '<p class="text-gray-400 text-center text-xs italic">Nenhum formulário ativo.</p>';
                    return;
                }

                listaForms.innerHTML = forms.map(f => `
                    <div class="flex items-center justify-between p-2 hover:bg-gray-50 rounded transition border-b border-gray-50 last:border-0">
                        <span class="text-sm text-gray-700 truncate font-medium">${f.titulo}</span>
                        <button type="button" data-id="${f.id}" class="btn-delete-form text-red-400 hover:text-red-600 transition px-2">
                            <i class="fa-solid fa-trash-can text-sm"></i>
                        </button>
                    </div>
                `).join('');

                document.querySelectorAll('.btn-delete-form').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        if (confirm("Deseja remover este formulário?")) {
                            await deleteDoc(doc(db, "forms", e.currentTarget.dataset.id));
                            renderForms();
                        }
                    });
                });
            } catch (e) { console.error(e); }
        }

        formForms.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-form');
            btn.disabled = true;
            const dados = {
                titulo: document.getElementById('form-titulo').value,
                link: document.getElementById('form-link').value,
                createdAt: serverTimestamp()
            };
            await addDoc(collection(db, "forms"), dados);
            formForms.reset();
            btn.disabled = false;
            renderForms();
        });
    </script>
</body>
</html>
